<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>메인 통합 시스템 | 화상 솔루션 집중도 계산기</title>
  <style>
    :root {
      --bg: #0b1020;
      --card: #141a33;
      --text: #e6e9f5;
      --muted: #8a94b8;
      --accent: #5b8cff;
      --ok: #22c55e;
      --err: #ef4444;
      --border: #23305b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Pretendard",
                   "Segoe UI", "Apple SD Gothic Neo", sans-serif;
      background: radial-gradient(1200px 800px at 20% -10%, #1a2350 0%, var(--bg) 50%);
      color: var(--text);
      min-height: 100vh;
    }
    .wrap { max-width: 1080px; margin: 0 auto; padding: 32px 20px 64px; }
    header h1 { font-size: 28px; margin: 0 0 6px; letter-spacing: -0.5px; }
    header p { color: var(--muted); margin: 0; }
    .grid {
      display: grid; gap: 20px; margin-top: 28px;
      grid-template-columns: 1fr 1fr;
    }
    @media (max-width: 820px) { .grid { grid-template-columns: 1fr; } }
    .card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 14px; padding: 18px 18px 16px;
    }
    .card h2 { font-size: 15px; margin: 0 0 10px; color: #c8d0ef; }
    textarea {
      width: 100%; min-height: 190px; background: #0e1430; color: var(--text);
      border: 1px solid var(--border); border-radius: 10px;
      padding: 12px; font-family: ui-monospace, Menlo, Consolas, monospace;
      font-size: 13px; line-height: 1.5; resize: vertical;
    }
    .row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 16px; }
    button {
      background: var(--accent); border: 0; color: white; padding: 10px 16px;
      border-radius: 10px; font-weight: 600; cursor: pointer; font-size: 14px;
    }
    button.ghost { background: transparent; border: 1px solid var(--border); color: var(--text); }
    pre {
      background: #0e1430; border: 1px solid var(--border); border-radius: 10px;
      padding: 14px; color: #d7def5; white-space: pre-wrap; word-break: break-word;
      max-height: 460px; overflow: auto; font-size: 13px;
    }
    .result { margin-top: 22px; }
    .score {
      display: inline-flex; align-items: baseline; gap: 8px;
      background: linear-gradient(180deg, #1d2653, #141a33);
      border: 1px solid var(--border); border-radius: 12px; padding: 12px 16px;
    }
    .score .num { font-size: 34px; font-weight: 800; color: #9fb6ff; }
    .score .lbl { color: var(--muted); font-size: 13px; }
    .badge { display: inline-block; padding: 3px 8px; border-radius: 999px; font-size: 12px; }
    .badge.ok { background: rgba(34,197,94,.15); color: var(--ok); border: 1px solid rgba(34,197,94,.35); }
    .badge.err { background: rgba(239,68,68,.15); color: var(--err); border: 1px solid rgba(239,68,68,.35); }
    .muted { color: var(--muted); font-size: 12px; }
    footer { color: var(--muted); font-size: 12px; margin-top: 32px; text-align: center; }
    code.kbd { background: #0e1430; padding: 2px 6px; border-radius: 6px; border: 1px solid var(--border); }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>메인 통합 시스템 · 집중도 계산기</h1>
      <p>에이전트1(시선) + 에이전트2(발화) JSON 을 통합해 가중치(시선 60% / 발화 40%)로 최종 집중도를 계산합니다.</p>
    </header>

    <div class="grid">
      <div class="card">
        <h2>① 에이전트 1 · 시선 (Gaze)</h2>
        <textarea id="agent1">{
  "agent": "gaze_agent",
  "status": "success",
  "gaze_score": 92.5
}</textarea>
      </div>
      <div class="card">
        <h2>② 에이전트 2 · 발화 (Speech)</h2>
        <textarea id="agent2">{
  "agent": "speech_agent",
  "status": "success",
  "speech_score": 82.5
}</textarea>
      </div>
    </div>

    <div class="row">
      <button id="btnLocal">로컬 계산 (JS)</button>
      <button id="btnApi" class="ghost">API 호출 (/api/integrate)</button>
      <button id="btnReset" class="ghost">초기화</button>
      <span class="muted" style="align-self:center">입력/출력은 모두 JSON 형식입니다.</span>
    </div>

    <div class="result">
      <div id="summary" class="score" style="display:none">
        <span class="lbl">최종 집중도</span>
        <span class="num" id="scoreNum">--</span>
        <span class="lbl">/ 100</span>
        <span id="statusBadge" class="badge ok" style="margin-left:10px">success</span>
      </div>
      <h2 style="margin:18px 0 8px;font-size:14px;color:#c8d0ef">출력 JSON</h2>
      <pre id="out">아직 계산되지 않았습니다. 위 버튼을 눌러 실행하세요.</pre>
    </div>

    <footer>
      배포: GitHub push → Cloudflare Pages 자동 배포 · API 엔드포인트: <code class="kbd">POST /api/integrate</code>
    </footer>
  </div>

  <script>
    const W_GAZE = 0.60;
    const W_SPEECH = 0.40;

    const $ = (id) => document.getElementById(id);
    const clip = (v) => {
      const n = Number(v);
      if (Number.isNaN(n)) return 0;
      return Math.max(0, Math.min(100, n));
    };
    const extractScore = (obj, keys) => {
      if (!obj || typeof obj !== "object") throw new Error("JSON object 필요");
      for (const k of keys) if (k in obj) return clip(obj[k]);
      for (const v of Object.values(obj)) {
        if (v && typeof v === "object") {
          for (const k of keys) if (k in v) return clip(v[k]);
        }
      }
      throw new Error("점수 필드(" + keys.join(", ") + ") 를 찾지 못했습니다.");
    };

    function integrateLocal(a1, a2) {
      const g = extractScore(a1, ["gaze_score", "focus_score", "score", "value"]);
      const s = extractScore(a2, ["speech_score", "focus_score", "score", "value"]);
      const f = Math.round((g * W_GAZE + s * W_SPEECH) * 100) / 100;
      return {
        agent: "main_system",
        status: "success",
        final_focus_score: f,
        github_push_ready: true,
        meta: {
          weights: { gaze: W_GAZE, speech: W_SPEECH },
          inputs: { agent1_gaze_score: g, agent2_speech_score: s },
          generated_at: new Date().toISOString(),
        },
      };
    }

    function parseInputs() {
      const a1 = JSON.parse($("agent1").value);
      const a2 = JSON.parse($("agent2").value);
      return [a1, a2];
    }

    function render(result) {
      $("out").textContent = JSON.stringify(result, null, 2);
      $("summary").style.display = "inline-flex";
      $("scoreNum").textContent =
        result.final_focus_score ?? "--";
      const b = $("statusBadge");
      b.textContent = result.status;
      b.className = "badge " + (result.status === "success" ? "ok" : "err");
    }

    $("btnLocal").addEventListener("click", () => {
      try {
        const [a1, a2] = parseInputs();
        render(integrateLocal(a1, a2));
      } catch (e) {
        render({ agent: "main_system", status: "error", error: String(e.message || e), github_push_ready: false });
      }
    });

    $("btnApi").addEventListener("click", async () => {
      try {
        const [a1, a2] = parseInputs();
        const res = await fetch("/api/integrate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ agent1: a1, agent2: a2 }),
        });
        const json = await res.json();
        render(json);
      } catch (e) {
        render({ agent: "main_system", status: "error", error: String(e.message || e), github_push_ready: false });
      }
    });

    $("btnReset").addEventListener("click", () => {
      $("agent1").value = JSON.stringify({ agent: "gaze_agent", status: "success", gaze_score: 92.5 }, null, 2);
      $("agent2").value = JSON.stringify({ agent: "speech_agent", status: "success", speech_score: 82.5 }, null, 2);
      $("out").textContent = "아직 계산되지 않았습니다. 위 버튼을 눌러 실행하세요.";
      $("summary").style.display = "none";
    });
  </script>
</body>
</html>
