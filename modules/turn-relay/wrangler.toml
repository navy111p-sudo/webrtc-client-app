#:schema node_modules/wrangler/config-schema.json

name = "cloudplayer-turn-relay"
main = "src/index.ts"
compatibility_date = "2026-04-07"

# Assets (클라이언트 예제 페이지)
[assets]
directory = "./public"

# Durable Objects 바인딩
[[durable_objects.bindings]]
name = "RELAY_ROOM"
class_name = "RelayRoom"

# Durable Objects 마이그레이션
[[migrations]]
tag = "v1"
new_sqlite_classes = ["RelayRoom"]

# 환경 변수
[vars]
MAX_ROOM_SIZE = "10"
RELAY_MODE = "auto"  # "auto" | "always" | "signaling-only"
