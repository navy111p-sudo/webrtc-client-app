<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>🎓 학생 드릴다운 — 망고아이</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg:#0f172a; --panel:#1e293b; --panel2:#263449;
    --fg:#e2e8f0; --mut:#94a3b8; --dim:#64748b; --bd:#334155;
    --y:#f59e0b; --g:#10b981; --r:#ef4444; --b:#3b82f6; --p:#a855f7;
  }
  *,*::before,*::after{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--fg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo",sans-serif;font-size:14px}
  a{color:#fde68a;text-decoration:none}

  header.top{height:56px;display:flex;align-items:center;gap:12px;padding:0 20px;border-bottom:1px solid var(--bd);background:#0b1220;position:sticky;top:0;z-index:50}
  header.top .brand{font-weight:800;color:#fbbf24}
  header.top .crumb{color:var(--mut);font-size:13px}
  header.top .right{margin-left:auto;display:flex;align-items:center;gap:8px}
  header.top a.btn,header.top button.btn{
    padding:6px 12px;border-radius:6px;border:1px solid var(--bd);background:var(--panel);color:var(--fg);
    font-size:12px;cursor:pointer
  }
  header.top a.btn:hover,header.top button.btn:hover{background:var(--panel2)}
  header.top select{padding:5px 10px;border-radius:6px;border:1px solid var(--bd);background:var(--panel);color:var(--fg);font-size:12px}

  main{display:grid;grid-template-columns:300px 1fr;gap:20px;padding:20px;max-width:1500px;margin:0 auto}

  /* ── 좌측 학생 카드 ── */
  aside.student-card{position:sticky;top:76px;align-self:flex-start;background:var(--panel);border:1px solid var(--bd);border-radius:10px;padding:18px}
  .avatar{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,var(--y),#d97706);color:#1e293b;font-size:30px;font-weight:800;display:flex;align-items:center;justify-content:center;margin:0 auto 12px}
  .name{font-size:18px;font-weight:700;text-align:center;margin:0}
  .name-sub{font-size:12px;color:var(--mut);text-align:center;margin-top:2px}
  .status-pill{display:inline-block;margin:8px auto 0;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600}
  .status-pill.ok{background:rgba(16,185,129,.18);color:#6ee7b7;border:1px solid #065f46}
  .status-pill.warn{background:rgba(245,158,11,.18);color:#fcd34d;border:1px solid #92400e}
  .status-pill.danger{background:rgba(239,68,68,.18);color:#fca5a5;border:1px solid #991b1b}
  .pill-wrap{text-align:center}
  .quick{margin-top:14px;border-top:1px solid var(--bd);padding-top:12px;font-size:12px;color:var(--mut);line-height:1.7}
  .quick b{color:var(--fg);font-weight:600}
  .quick-row{display:flex;justify-content:space-between;gap:8px;padding:2px 0}
  .quick-row .v{color:var(--fg);text-align:right;font-weight:500}

  /* ── 탭 ── */
  .tabs{display:flex;flex-wrap:wrap;gap:2px;border-bottom:1px solid var(--bd);background:var(--panel);border-radius:10px 10px 0 0;padding:6px 6px 0}
  .tab{padding:9px 14px;font-size:13px;color:var(--mut);background:transparent;border:0;cursor:pointer;border-radius:6px 6px 0 0;font-weight:500;border-bottom:2px solid transparent;margin-bottom:-1px}
  .tab:hover{color:var(--fg);background:var(--panel2)}
  .tab.active{color:#fcd34d;border-bottom-color:var(--y);background:#0b1220;font-weight:700}

  .tab-body{background:var(--panel);border:1px solid var(--bd);border-top:0;border-radius:0 0 10px 10px;padding:18px;min-height:400px}
  .panel{display:none}
  .panel.active{display:block}

  /* ── KPI / 카드 ── */
  .kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;margin-bottom:14px}
  .kpi{background:var(--panel2);border:1px solid var(--bd);border-radius:8px;padding:13px 16px}
  .kpi .lab{font-size:10px;color:var(--mut);text-transform:uppercase;letter-spacing:.6px}
  .kpi .val{font-size:22px;font-weight:700;margin-top:3px}
  .kpi .sub{font-size:11px;color:var(--dim);margin-top:2px}
  .kpi.green .val{color:var(--g)} .kpi.yellow .val{color:var(--y)}
  .kpi.red .val{color:var(--r)}   .kpi.blue .val{color:var(--b)}
  .kpi.purple .val{color:var(--p)}

  /* ── 차트 ── */
  .chart-wrap{background:var(--panel2);border:1px solid var(--bd);border-radius:8px;padding:14px;margin-bottom:14px}
  .chart-wrap h3{margin:0 0 10px;font-size:13px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.6px}
  /* 🩹 Chart.js 무한 확대 방지 — canvas 부모에 명시적 높이 + position:relative 필수.
     responsive:true + maintainAspectRatio:false 사용 시 부모 박스 크기를 매 프레임 측정하기 때문에
     높이가 고정 안 되면 자기 자신을 다시 키우는 피드백 루프가 돈다. */
  .chart-box{position:relative;height:280px;width:100%}
  .chart-box.short{height:220px}

  /* ── 테이블 ── */
  table.list{width:100%;border-collapse:collapse;font-size:13px}
  table.list th,table.list td{padding:9px 12px;border-bottom:1px solid var(--bd);text-align:left;vertical-align:top}
  table.list th{background:var(--panel2);color:var(--mut);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;position:sticky;top:0}
  table.list tr:hover td{background:rgba(245,158,11,.06)}
  .empty{text-align:center;padding:40px 10px;color:var(--mut);font-size:13px}
  .badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
  .badge.green{background:rgba(16,185,129,.18);color:#6ee7b7}
  .badge.yellow{background:rgba(245,158,11,.18);color:#fcd34d}
  .badge.red{background:rgba(239,68,68,.18);color:#fca5a5}
  .badge.blue{background:rgba(59,130,246,.18);color:#93c5fd}
  .badge.gray{background:rgba(100,116,139,.2);color:#94a3b8}

  /* ── 폼 ── */
  .form-row{display:grid;grid-template-columns:140px 1fr;gap:10px;align-items:center;margin-bottom:8px}
  .form-row label{font-size:12px;color:var(--mut)}
  .form-row input, .form-row select, .form-row textarea{
    width:100%;padding:8px 10px;background:var(--panel2);color:var(--fg);
    border:1px solid var(--bd);border-radius:6px;font-size:13px;font-family:inherit
  }
  .form-row textarea{min-height:70px;resize:vertical}
  .form-actions{margin-top:12px;display:flex;gap:8px;justify-content:flex-end}
  .btn-add{padding:8px 18px;border:0;background:var(--y);color:#1e293b;font-weight:700;border-radius:6px;cursor:pointer;font-size:13px}
  .btn-add:hover{background:#fbbf24}
  .btn-add:disabled{opacity:.55;cursor:progress}
  .btn-mini{padding:4px 10px;font-size:11px;border:1px solid var(--bd);background:var(--panel2);color:var(--fg);border-radius:5px;cursor:pointer}
  .btn-mini:hover{background:#3a4a64}

  .add-form-card{background:var(--panel2);border:1px solid var(--bd);border-radius:8px;padding:16px;margin-bottom:14px}
  .add-form-card h4{margin:0 0 12px;font-size:13px;color:#fcd34d;font-weight:700}

  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);opacity:0;background:#1e293b;color:var(--fg);border:1px solid var(--bd);padding:9px 18px;border-radius:6px;font-size:13px;z-index:9999;transition:opacity .2s,transform .2s}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .toast.err{border-color:#7f1d1d;background:#3b1818}

  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  @media (max-width:900px){
    main{grid-template-columns:1fr}
    aside.student-card{position:static}
    .grid-2{grid-template-columns:1fr}
  }
</style>
</head>
<body>

<header class="top">
  <span class="brand">🥭 망고아이</span>
  <span class="crumb">관리자 &rsaquo; 학생 드릴다운</span>
  <div class="right">
    <select id="period">
      <option value="7">최근 7일</option>
      <option value="30" selected>최근 30일</option>
      <option value="90">최근 90일</option>
      <option value="365">최근 1년</option>
    </select>
    <button class="btn" id="refreshBtn">🔄 새로고침</button>
    <a class="btn" href="/admin/students">👨‍🎓 학생 목록</a>
    <a class="btn" href="/admin.html">📊 대시보드</a>
  </div>
</header>

<main>
  <!-- 좌측 학생 카드 -->
  <aside class="student-card" id="studentCard">
    <div class="avatar" id="avatarText">?</div>
    <p class="name" id="cardName">로딩 중…</p>
    <p class="name-sub" id="cardSub">—</p>
    <div class="pill-wrap"><span class="status-pill ok" id="cardStatus">정상</span></div>
    <div class="quick" id="cardQuick"></div>
  </aside>

  <!-- 우측 탭 영역 -->
  <section>
    <nav class="tabs" role="tablist">
      <button class="tab active" data-tab="overview">📊 개요</button>
      <button class="tab" data-tab="enrollment">📝 등록·수강</button>
      <button class="tab" data-tab="payment">💰 수업료</button>
      <button class="tab" data-tab="classes">📅 수업 현황</button>
      <button class="tab" data-tab="engagement">🎯 참여도·점수</button>
      <button class="tab" data-tab="evaluation">📋 평가서</button>
      <button class="tab" data-tab="feedback">💬 교사 피드백</button>
      <button class="tab" data-tab="consult">📞 상담 내역</button>
      <button class="tab" data-tab="contact">👨‍👩‍👧 연락처·정보</button>
      <button class="tab" data-tab="textbook">📚 교재</button>
      <button class="tab" data-tab="recording">🎬 수업 녹화</button>
    </nav>

    <div class="tab-body">
      <!-- 1. 개요 -->
      <div class="panel active" data-panel="overview">
        <div class="kpi-grid" id="overviewKpis"></div>
        <div class="chart-wrap">
          <h3>일자별 활동 (출석·세션·집중도)</h3>
          <div class="chart-box"><canvas id="dayChart"></canvas></div>
        </div>
        <div class="grid-2">
          <div class="chart-wrap">
            <h3>최근 보상</h3>
            <div id="overviewRewards"></div>
          </div>
          <div class="chart-wrap">
            <h3>동의 현황</h3>
            <div id="overviewConsent"></div>
          </div>
        </div>
      </div>

      <!-- 2. 등록·수강 -->
      <div class="panel" data-panel="enrollment">
        <div id="enrollmentBox"><div class="empty">로딩 중…</div></div>
      </div>

      <!-- 3. 수업료 -->
      <div class="panel" data-panel="payment">
        <div class="add-form-card">
          <h4>💰 수업료 결제 추가</h4>
          <div class="grid-2">
            <div class="form-row"><label>결제일</label><input id="payDate" type="date"></div>
            <div class="form-row"><label>금액 (원)</label><input id="payAmount" type="number" placeholder="120000"></div>
            <div class="form-row"><label>기간 시작</label><input id="payPeriodStart" type="date"></div>
            <div class="form-row"><label>기간 종료</label><input id="payPeriodEnd" type="date"></div>
            <div class="form-row"><label>방식</label>
              <select id="payMethod">
                <option value="card">카드</option><option value="transfer">계좌이체</option>
                <option value="cash">현금</option><option value="kakao">카카오페이</option>
              </select>
            </div>
            <div class="form-row"><label>메모</label><input id="payMemo" type="text" placeholder="2026년 5월 수강료"></div>
          </div>
          <div class="form-actions"><button class="btn-add" id="payAddBtn">+ 결제 추가</button></div>
        </div>
        <div id="paymentBox"><div class="empty">로딩 중…</div></div>
      </div>

      <!-- 4. 수업 현황 -->
      <div class="panel" data-panel="classes">
        <div class="kpi-grid" id="classKpis"></div>
        <div id="classBox"><div class="empty">로딩 중…</div></div>
      </div>

      <!-- 5. 참여도·점수 -->
      <div class="panel" data-panel="engagement">
        <div class="kpi-grid" id="engKpis"></div>
        <div class="chart-wrap"><h3>일자별 평균 집중도(시선 점수)</h3><div class="chart-box short"><canvas id="gazeChart"></canvas></div></div>
        <div class="chart-wrap"><h3>세션별 점수 (최근 30건)</h3><div class="chart-box"><canvas id="sessionScoreChart"></canvas></div></div>
      </div>

      <!-- 6. 평가서 -->
      <div class="panel" data-panel="evaluation">
        <div class="add-form-card">
          <h4>📋 평가서 작성</h4>
          <div class="grid-2">
            <div class="form-row"><label>평가일</label><input id="evDate" type="date"></div>
            <div class="form-row"><label>평가 유형</label>
              <select id="evType">
                <option value="monthly">월간 평가</option><option value="quarterly">분기 평가</option>
                <option value="level">레벨 테스트</option><option value="final">최종 평가</option>
              </select>
            </div>
            <div class="form-row"><label>레벨</label><input id="evLevel" type="text" placeholder="A1·B1·B2…"></div>
            <div class="form-row"><label>평가자</label><input id="evEvaluator" type="text" placeholder="이름"></div>
            <div class="form-row"><label>스피킹 점수</label><input id="evSpeak" type="number" min="0" max="100" step="0.1"></div>
            <div class="form-row"><label>리스닝 점수</label><input id="evList" type="number" min="0" max="100" step="0.1"></div>
            <div class="form-row"><label>리딩 점수</label><input id="evRead" type="number" min="0" max="100" step="0.1"></div>
            <div class="form-row"><label>라이팅 점수</label><input id="evWrite" type="number" min="0" max="100" step="0.1"></div>
            <div class="form-row"><label>총점</label><input id="evTotal" type="number" min="0" max="100" step="0.1"></div>
            <div class="form-row"><label>다음 목표</label><input id="evGoal" type="text"></div>
          </div>
          <div class="form-row"><label>코멘트</label><textarea id="evComment" placeholder="평가 종합 의견"></textarea></div>
          <div class="form-actions"><button class="btn-add" id="evAddBtn">+ 평가서 저장</button></div>
        </div>
        <div id="evalBox"><div class="empty">로딩 중…</div></div>
      </div>

      <!-- 7. 교사 피드백 -->
      <div class="panel" data-panel="feedback">
        <div class="add-form-card">
          <h4>💬 교사 피드백 추가</h4>
          <div class="grid-2">
            <div class="form-row"><label>수업일</label><input id="fbDate" type="date"></div>
            <div class="form-row"><label>교사</label><input id="fbTeacher" type="text"></div>
            <div class="form-row"><label>방 ID</label><input id="fbRoom" type="text"></div>
            <div class="form-row"><label>평점 (1~5)</label><input id="fbRating" type="number" min="1" max="5"></div>
          </div>
          <div class="form-row"><label>요약</label><input id="fbSummary" type="text" placeholder="한 줄 요약"></div>
          <div class="form-row"><label>상세</label><textarea id="fbContent"></textarea></div>
          <div class="form-row"><label>액션 아이템</label><textarea id="fbActions" placeholder="다음 수업 전까지 할 것"></textarea></div>
          <div class="form-actions"><button class="btn-add" id="fbAddBtn">+ 피드백 저장</button></div>
        </div>
        <div id="feedbackBox"><div class="empty">로딩 중…</div></div>
      </div>

      <!-- 8. 상담 내역 -->
      <div class="panel" data-panel="consult">
        <div class="add-form-card">
          <h4>📞 상담 기록 추가</h4>
          <div class="grid-2">
            <div class="form-row"><label>상담 일시</label><input id="csDate" type="datetime-local"></div>
            <div class="form-row"><label>채널</label>
              <select id="csChannel">
                <option value="phone">전화</option><option value="kakao">카카오톡</option>
                <option value="visit">방문</option><option value="email">이메일</option>
                <option value="online">온라인 미팅</option>
              </select>
            </div>
            <div class="form-row"><label>상담자</label><input id="csCounselor" type="text"></div>
            <div class="form-row"><label>주제</label><input id="csTopic" type="text" placeholder="진도·결제·불만 등"></div>
            <div class="form-row"><label>후속 일정</label><input id="csFollow" type="datetime-local"></div>
            <div class="form-row"><label>상태</label>
              <select id="csStatus"><option value="open">진행</option><option value="resolved">완료</option><option value="escalated">에스컬레이션</option></select>
            </div>
          </div>
          <div class="form-row"><label>상담 내용</label><textarea id="csContent"></textarea></div>
          <div class="form-actions"><button class="btn-add" id="csAddBtn">+ 상담 저장</button></div>
        </div>
        <div id="consultBox"><div class="empty">로딩 중…</div></div>
      </div>

      <!-- 9. 연락처·정보 -->
      <div class="panel" data-panel="contact">
        <div class="add-form-card">
          <h4>👨‍👩‍👧 학생 정보 편집</h4>
          <div class="grid-2">
            <div class="form-row"><label>학생 전화</label><input id="cStudentPhone" type="tel"></div>
            <div class="form-row"><label>부모님 전화</label><input id="cParentPhone" type="tel"></div>
            <div class="form-row"><label>담임 교사 전화</label><input id="cTeacherPhone" type="tel"></div>
            <div class="form-row"><label>학생 카톡 ID</label><input id="cKakao" type="text"></div>
            <div class="form-row"><label>부모님 카톡 ID</label><input id="cParentKakao" type="text"></div>
            <div class="form-row"><label>학교</label><input id="cSchool" type="text"></div>
            <div class="form-row"><label>학년</label><input id="cGrade" type="text" placeholder="초3·중1·고2…"></div>
            <div class="form-row"><label>생년월일</label><input id="cBirth" type="date"></div>
            <div class="form-row"><label>가맹점</label><input id="cFranchise" type="text"></div>
            <div class="form-row"><label>지점</label><input id="cShop" type="text"></div>
          </div>
          <div class="form-row"><label>주소</label><input id="cAddress" type="text"></div>
          <div class="form-row"><label>특이사항</label><textarea id="cNotes" placeholder="알레르기·관심사·학습 성향 등"></textarea></div>
          <div class="form-actions"><button class="btn-add" id="cSaveBtn">💾 저장</button></div>
        </div>
      </div>

      <!-- 10. 교재 -->
      <div class="panel" data-panel="textbook">
        <div id="textbookBox"><div class="empty">로딩 중…</div></div>
      </div>

      <!-- 11. 녹화 영상 -->
      <div class="panel" data-panel="recording">
        <div id="recordingBox"><div class="empty">로딩 중…</div></div>
      </div>
    </div>
  </section>
</main>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════ 공통 ═══════════════════════
const $ = id => document.getElementById(id);
const uid = new URLSearchParams(location.search).get('uid') || '';
let _state = { full: null, days: 30 };
let _charts = {};

function toast(msg, isErr){
  const el = $('toast');
  el.textContent = msg; el.classList.toggle('err', !!isErr); el.classList.add('show');
  clearTimeout(toast._t); toast._t = setTimeout(()=>el.classList.remove('show'), 2500);
}
function fmtMs(ms){
  if (!ms || ms<0) return '0초';
  const s = Math.floor(ms/1000), h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sec = s%60;
  if (h>0) return h+'시간 '+m+'분';
  if (m>0) return m+'분 '+sec+'초';
  return sec+'초';
}
function fmtDate(ts){
  if (!ts) return '—';
  const d = new Date(ts);
  return d.toLocaleString('ko-KR',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
}
function fmtDay(ts){
  if (!ts) return '—';
  const d = new Date(ts);
  return d.toLocaleDateString('ko-KR',{year:'numeric',month:'2-digit',day:'2-digit'});
}
function fmtKrw(n){ return (Number(n)||0).toLocaleString('ko-KR') + '원'; }
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function scoreBadge(v){
  if (v == null || isNaN(v)) return '<span class="badge gray">—</span>';
  const n = Math.round(v*10)/10;
  const cls = n>=70?'green':(n>=40?'yellow':'red');
  return '<span class="badge '+cls+'">'+n+'</span>';
}
function pctBadge(active, session){
  if (!session) return '<span class="badge gray">—</span>';
  const p = (active/session*100), n = Math.round(p*10)/10;
  return '<span class="badge '+(n>=30?'green':n>=10?'yellow':'red')+'">'+n+'%</span>';
}
function statusBadge(s){
  if (!s) return '<span class="badge gray">—</span>';
  const map = { paid:'green', overdue:'red', pending:'yellow', open:'yellow', resolved:'green', escalated:'red', active:'green', ended:'gray', cancelled:'red', confirmed:'green' };
  return '<span class="badge '+(map[s]||'blue')+'">'+esc(s)+'</span>';
}

async function loadFull() {
  if (!uid) {
    document.querySelector('main').innerHTML = '<div class="empty">⚠ ?uid=&lt;학생ID&gt; 파라미터가 필요합니다. 학생 목록에서 클릭해 주세요.</div>';
    return;
  }
  _state.days = parseInt($('period').value, 10) || 30;
  try {
    const r = await fetch('/api/admin/student/'+encodeURIComponent(uid)+'/full?days='+_state.days, { credentials:'include' });
    if (r.status === 404) {
      const j = await r.json().catch(()=>({}));
      document.querySelector('main').innerHTML = '<div class="empty">학생을 찾을 수 없습니다 — '+(j.user_id||uid)+'</div>';
      return;
    }
    if (r.status === 401) { location.replace('/admin/login?next='+encodeURIComponent(location.pathname+location.search)); return; }
    const j = await r.json();
    if (!j.ok) throw new Error(j.error||r.status);
    _state.full = j;
    renderAll();
  } catch (e) {
    toast('로딩 실패: '+(e.message||e), true);
    console.error(e);
  }
}

  $('consultBox').innerHTML = '<table class="list"><thead><tr><th>일시</th><th>채널</th><th>상담자</th><th>주제</th><th>내용</th><th>후속</th><th>상태</th></tr></thead><tbody>'+
    items.map(c=>`<tr>
      <td>${fmtDate(c.consult_at)}</td>
      <td>${esc(c.channel)||'—'}</td>
      <td>${esc(c.counselor)||'—'}</td>
      <td>${esc(c.topic)||'—'}</td>
      <td style="white-space:pre-wrap;max-width:320px">${esc(c.content)||'—'}</td>
      <td>${c.follow_up_at?fmtDate(c.follow_up_at):'—'}</td>
      <td>${statusBadge(c.status)}</td>
    </tr>`).join('')+'</tbody></table>';
}

$('csAddBtn').addEventListener('click', async () => {
  const body = {
    consult_at: $('csDate').value ? new Date($('csDate').value).getTime() : Date.now(),
    channel: $('csChannel').value,
    counselor: $('csCounselor').value || null,
    topic: $('csTopic').value || null,
    content: $('csContent').value || '',
    follow_up_at: $('csFollow').value ? new Date($('csFollow').value).getTime() : null,
    status: $('csStatus').value
  };
  if (!body.content && !body.topic) { toast('주제 또는 내용을 입력하세요', true); return; }
  await postSave('/api/admin/student/'+encodeURIComponent(uid)+'/consultations', body, '상담');
  ['csCounselor','csTopic','csContent','csFollow'].forEach(id=>$(id).value='');
});

// ═══════════════════════ 9. 연락처·정보 ═══════════════════════
function renderContact(){
  const erp = _state.full.erp || {};
  const map = {
    cStudentPhone: erp.student_phone, cParentPhone: erp.parent_phone, cTeacherPhone: erp.teacher_phone,
    cKakao: erp.kakao_id, cParentKakao: erp.parent_kakao_id,
    cSchool: erp.school, cGrade: erp.grade, cBirth: erp.birth_date,
    cFranchise: erp.franchise, cShop: erp.shop_name,
    cAddress: erp.address, cNotes: erp.notes
  };
  Object.entries(map).forEach(([id, v]) => { if ($(id)) $(id).value = v||''; });
}

$('cSaveBtn').addEventListener('click', async () => {
  const body = {
    student_phone: $('cStudentPhone').value || null,
    parent_phone: $('cParentPhone').value || null,
    teacher_phone: $('cTeacherPhone').value || null,
    kakao_id: $('cKakao').value || null,
    parent_kakao_id: $('cParentKakao').value || null,
    school: $('cSchool').value || null,
    grade: $('cGrade').value || null,
    birth_date: $('cBirth').value || null,
    franchise: $('cFranchise').value || null,
    shop_name: $('cShop').value || null,
    address: $('cAddress').value || null,
    notes: $('cNotes').value || null
  };
  const btn = $('cSaveBtn'); btn.disabled = true;
  try {
    const r = await fetch('/api/admin/student/'+encodeURIComponent(uid)+'/contact', {
      method: 'PATCH', credentials:'include',
      headers: {'Content-Type':'application/json'}, body: JSON.stringify(body)
    });
    const j = await r.json();
    if (r.ok && j.ok) toast('학생 정보가 저장되었습니다 ('+(j.updated_fields||0)+'개 필드).');
    else toast('저장 실패: '+(j.error||r.status), true);
  } catch (e) { toast('네트워크 오류', true); }
  finally { btn.disabled = false; }
});

// ═══════════════════════ 10. 교재 ═══════════════════════
function renderTextbook(){
  const items = _state.full.textbooks || [];
  if (items.length === 0) { $('textbookBox').innerHTML = '<div class="empty">배정된 교재가 없습니다.</div>'; return; }
  $('textbookBox').innerHTML = '<table class="list"><thead><tr><th>교재</th><th>레벨</th><th>시작</th><th>종료</th><th>진도</th><th>상태</th></tr></thead><tbody>'+
    items.map(t=>`<tr>
      <td>${esc(t.textbook_name)||'—'}</td>
      <td>${esc(t.level)||'—'}</td>
      <td>${fmtDay(t.started_at)}</td>
      <td>${fmtDay(t.ended_at)}</td>
      <td>
        <div style="background:#334155;border-radius:4px;height:8px;width:120px;overflow:hidden">
          <div style="height:100%;background:var(--g);width:${Math.min(100,t.progress_pct||0)}%"></div>
        </div>
        <div style="font-size:11px;color:var(--mut);margin-top:2px">${t.progress_pct||0}%</div>
      </td>
      <td>${statusBadge(t.status)}</td>
    </tr>`).join('')+'</tbody></table>';
}

// ═══════════════════════ 11. 녹화 영상 ═══════════════════════
function renderRecording(){
  const items = _state.full.recordings || [];
  if (items.length === 0) { $('recordingBox').innerHTML = '<div class="empty">녹화 영상이 없습니다.</div>'; return; }
  $('recordingBox').innerHTML = '<table class="list"><thead><tr><th>일시</th><th>방</th><th>교사</th><th>파일</th><th>길이</th><th>크기</th><th>상태</th><th>액션</th></tr></thead><tbody>'+
    items.map(r=>`<tr>
      <td>${fmtDate(r.started_at)}</td>
      <td>${esc(r.room_id)}</td>
      <td>${esc(r.teacher_name)||'—'}</td>
      <td style="font-family:monospace;font-size:11px">${esc(r.filename)}</td>
      <td>${fmtMs(r.duration_ms)}</td>
      <td>${r.size_bytes?(Math.round(r.size_bytes/1024/1024*10)/10)+' MB':'—'}</td>
      <td>${statusBadge(r.status)}</td>
      <td>
        <button class="btn-mini" onclick="window.open('/api/recordings/blob/'+${r.id}+'?stream=1','_blank')">▶ 재생</button>
      </td>
    </tr>`).join('')+'</tbody></table>';
}

// ═══════════════════════ 공통 저장 ═══════════════════════
async function postSave(url, body, label){
  try {
    const r = await fetch(url, {
      method:'POST', credentials:'include',
      headers:{'Content-Type':'application/json'}, body: JSON.stringify(body)
    });
    const j = await r.json();
    if (r.ok && j.ok) {
      toast(label+' 저장 완료');
      await loadFull();
    } else {
      toast(label+' 저장 실패: '+(j.error||r.status), true);
    }
  } catch (e) { toast('네트워크 오류', true); }
}

// ═══════════════════════ 컨트롤 ═══════════════════════
$('refreshBtn').addEventListener('click', loadFull);
$('period').addEventListener('change', loadFull);

// 시작
loadFull();
</script>
